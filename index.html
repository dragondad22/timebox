<style>
:root {
  --bg: #111214;
  --surface: #1c1e21;
  --border: #2c2e33;
  --text: #e8e6e1;
  --muted: #555860;
  --accent: #e8f558;
  --accent2: #58d8f5;
  --slot-h: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* AUTH SCREEN */
#authScreen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px;
}

.auth-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 4px;
  color: var(--accent);
}

.auth-sub {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  line-height: 1.8;
  letter-spacing: 0.04em;
}

#googleSignInBtn {
  background: #fff;
  color: #333;
  border: none;
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 14px;
  font-family: 'IBM Plex Mono', monospace;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
}

#googleSignInBtn svg { flex-shrink: 0; }

/* MAIN APP */
#appScreen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#appScreen.visible { display: flex; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 2px;
  color: var(--accent);
  flex-shrink: 0;
}

.day-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.nav-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 5px 11px;
  font-size: 15px;
  cursor: pointer;
  line-height: 1;
}

.day-label {
  font-size: 11px;
  color: var(--text);
  min-width: 96px;
  text-align: center;
  letter-spacing: 0.06em;
}

.today-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 5px 9px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background 0.3s;
  cursor: pointer;
  title: "Sign out";
}
.sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
.sync-dot.ok      { background: #4caf50; }
.sync-dot.err     { background: #e55; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.schedule-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  position: relative;
}

.schedule {
  display: flex;
  position: relative;
}

.time-col {
  width: 52px;
  flex-shrink: 0;
  position: sticky;
  left: 0;
  background: var(--bg);
  z-index: 2;
}

.hour-label {
  height: calc(var(--slot-h) * 4);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 3px 8px 0 0;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.slots-col {
  flex: 1;
  position: relative;
  border-left: 1px solid var(--border);
}

.slot {
  height: var(--slot-h);
  border-bottom: 1px solid #1a1c20;
  cursor: pointer;
}

.slot.hour-top  { border-top: 1px solid var(--border); border-bottom: 1px solid #1a1c20; }
.slot.quarter   { border-bottom: 1px solid #1a1c20; }
.slot.half-hour { border-bottom: 1px solid #1a1c20; }
.slot.selecting { background: rgba(232,245,88,0.2) !important; }

.entry-block {
  position: absolute;
  left: 3px; right: 3px;
  border-radius: 5px;
  padding: 2px 7px;
  display: flex;
  align-items: center;
  gap: 5px;
  overflow: hidden;
  z-index: 1;
  border: 1px solid rgba(255,255,255,0.08);
}

.eb-emoji { font-size: 13px; flex-shrink: 0; line-height: 1; }
.eb-name  { font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.eb-time  { font-size: 9px; color: rgba(255,255,255,0.4); flex-shrink: 0; }
.eb-del {
  margin-left: 2px; flex-shrink: 0;
  background: rgba(0,0,0,0.35); border: none;
  color: rgba(255,255,255,0.5); border-radius: 3px;
  width: 15px; height: 15px; font-size: 11px;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; padding: 0; line-height: 1;
}

.now-line {
  position: absolute; left: 0; right: 0;
  height: 2px; background: var(--accent2);
  z-index: 3; pointer-events: none;
}
.now-dot {
  position: absolute; left: -4px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent2);
}

/* PICKER */
.picker-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 10; display: none;
  align-items: flex-end;
  backdrop-filter: blur(3px);
}
.picker-overlay.open { display: flex; }

.picker-sheet {
  background: #16181c;
  border-top: 1px solid var(--border);
  border-radius: 18px 18px 0 0;
  width: 100%;
  padding: 14px 14px 28px;
  transform: translateY(100%);
  transition: transform 0.26s cubic-bezier(0.32, 0.72, 0, 1);
}
.picker-overlay.open .picker-sheet { transform: translateY(0); }

.picker-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 14px;
}
.picker-range { font-size: 13px; color: var(--accent); letter-spacing: 0.04em; }
.picker-close {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px; padding: 5px 11px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer;
}

.cat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; margin-bottom: 12px;
}

.cat-pill {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 11px 4px 9px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
}
.cat-pill:active { transform: scale(0.93); border-color: var(--accent); }
.cp-emoji { font-size: 21px; }
.cp-name  { font-size: 9px; color: var(--muted); text-align: center; line-height: 1.2; }

.custom-row { display: flex; gap: 8px; }

.custom-input {
  flex: 1; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 12px; color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none;
}
.custom-input:focus { border-color: var(--accent); }
.custom-input::placeholder { color: var(--muted); }

.log-btn {
  background: var(--accent); color: #000; border: none;
  border-radius: 8px; padding: 10px 16px;
  font-family: 'Bebas Neue', sans-serif; font-size: 17px;
  letter-spacing: 1px; cursor: pointer;
}

.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(30px);
  background: var(--accent); color: #000;
  padding: 8px 18px; border-radius: 40px;
  font-size: 12px; font-weight: 500;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
  z-index: 100; pointer-events: none; opacity: 0;
  white-space: nowrap; max-width: 92vw;
  overflow: hidden; text-overflow: ellipsis;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.err  { background: #e55; color: #fff; }

/* SUMMARY */
.summary-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px;
  padding: 5px 9px; font-size: 14px; cursor: pointer; flex-shrink: 0;
}
.summary-btn.active { border-color: var(--accent); color: var(--accent); }

#summaryPanel {
  display: none; flex-direction: column;
  flex: 1; overflow-y: auto;
}
#summaryPanel.visible { display: flex; }

.summary-chart-area { display: flex; justify-content: center; padding: 20px 16px 12px; }
.summary-controls {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.untracked-toggle { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); cursor: pointer; letter-spacing: 0.04em; }
.untracked-toggle input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

.summary-empty { color: var(--muted); font-size: 12px; text-align: center; padding: 40px 16px; }

.summary-legend { width: 100%; display: flex; flex-direction: column; }
.legend-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 1px solid var(--border); }
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.legend-name { flex: 1; font-size: 11px; }
.legend-time { font-size: 11px; }
.legend-pct  { font-size: 10px; color: var(--muted); min-width: 40px; text-align: right; }
</style>
</head>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-logo">TIMEBOX</div>
  <div class="auth-sub">Sign in with Google to sync<br>your time blocks to Calendar</div>

    Sign in with Google
  </button>
</div>

<!-- MAIN APP -->
<div id="appScreen">
  <header>
    <div class="logo">TIMEBOX</div>
    <div class="day-nav">
      <button class="nav-btn" id="prevDay">◀</button>
      <div class="day-label" id="dayLabel">—</div>
      <button class="nav-btn" id="nextDay">▶</button>
    </div>
    <button class="today-btn" id="todayBtn">TODAY</button>
    <button class="summary-btn" id="summaryBtn">◑</button>
    <div class="sync-dot" id="syncDot" title="Tap to sign out"></div>
  </header>

  <div class="schedule-wrap" id="schedWrap">
    <div class="schedule">
      <div class="time-col" id="timeCol"></div>
      <div class="slots-col" id="slotsCol"></div>
    </div>
  </div>

  <div id="summaryPanel">
    <div class="summary-chart-area">
      <canvas id="summaryCanvas"></canvas>
    </div>
    <div class="summary-controls">
      <label class="untracked-toggle">
        <input type="checkbox" id="showUntrackedChk" checked>
        Show untracked
      </label>
    </div>
    <div class="summary-legend" id="summaryLegend"></div>
  </div>
</div>

<!-- PICKER -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-sheet">
    <div class="picker-header">
      <div class="picker-range" id="pickerRange">—</div>
      <button class="picker-close" id="pickerClose">Cancel</button>
    </div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="custom-row">
      <input class="custom-input" id="customInput" placeholder="other activity…" maxlength="30">
      <button class="log-btn" id="logCustomBtn">LOG</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  { emoji: '😴', name: 'Sleep',         color: '#141422' },
  { emoji: '🍽️', name: 'Meal/Meal Prep',          color: '#382210' },
  { emoji: '📺', name: 'Entertainment', color: '#3a1a1a' },
  { emoji: '🏡', name: 'Housework', color: '#F54927' },
  { emoji: '👨‍👩‍👧‍👦', name: 'Family/Friends', color: '#4a2e1e' },
];

function catByName(n) {
  return CATEGORIES.find(c => c.name === n) || { emoji: '📌', name: n, color: '#252830' };
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let accessToken = null;
let tokenExpiry  = 0;
let viewDay      = 0;
let entries      = [];
let selStart = null, selEnd = null, isDragging = false;

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function initAuth() {
  // Try to restore token from localStorage
  const saved = localStorage.getItem('tb_token');
  if (saved) {
    const parsed = JSON.parse(saved);
    if (parsed.expiry > Date.now() + 60000) {
      accessToken = parsed.token;
      tokenExpiry  = parsed.expiry;
      showApp();
      return;
    }
  }
  // Show sign-in screen
  document.getElementById('authScreen').style.display = 'flex';
}

document.getElementById('googleSignInBtn').onclick = () => {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { showToast('Sign-in failed: ' + resp.error, true); return; }
      accessToken = resp.access_token;
      tokenExpiry  = Date.now() + (resp.expires_in * 1000);
      localStorage.setItem('tb_token', JSON.stringify({ token: accessToken, expiry: tokenExpiry }));
      showApp();
    }
  });
  client.requestAccessToken();
};

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('visible');
  buildSchedule();
  scrollToNow();
}

function signOut() {
  if (!confirm('Sign out of TimeBox?')) return;
  google.accounts.oauth2.revoke(accessToken, () => {});
  localStorage.removeItem('tb_token');
  accessToken = null;
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('authScreen').style.display = 'flex';
}

document.getElementById('syncDot').onclick = signOut;

async function getToken() {
  // Refresh if within 2 minutes of expiry
  if (Date.now() > tokenExpiry - 120000) {
    return new Promise((resolve) => {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        prompt: '',
        callback: (resp) => {
          if (resp.access_token) {
            accessToken = resp.access_token;
            tokenExpiry  = Date.now() + (resp.expires_in * 1000);
            localStorage.setItem('tb_token', JSON.stringify({ token: accessToken, expiry: tokenExpiry }));
          }
          resolve(accessToken);
        }
      });
      client.requestAccessToken();
    });
  }
  return accessToken;
}

// ─── CALENDAR API ─────────────────────────────────────────────────────────────
async function gcalRequest(method, path, body) {
  const token = await getToken();
  const res = await fetch(`https://www.googleapis.com/calendar/v3${path}`, {
    method,
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function fetchDayEvents(date) {
  setSyncState('syncing');
  try {
    const start = new Date(date); start.setHours(0,0,0,0);
    const end   = new Date(date); end.setHours(23,59,59,999);
    const calId = encodeURIComponent(CALENDAR_ID);
    const params = new URLSearchParams({
      timeMin: start.toISOString(),
      timeMax: end.toISOString(),
      singleEvents: 'true',
      orderBy: 'startTime',
      maxResults: '250'
    });
    const data = await gcalRequest('GET', `/calendars/${calId}/events?${params}`);
    const nextDay = new Date(date); nextDay.setDate(nextDay.getDate() + 1); nextDay.setHours(0,0,0,0);
    entries = (data.items || [])
      .filter(ev => ev.summary?.startsWith(TB_PREFIX))
      .map(ev => {
        const body  = ev.summary.slice(TB_PREFIX.length);
        const emoji = [...body][0];                       // first char (handles multi-byte emoji)
        const name  = body.slice([...body][0].length + ([...body][1] === ' ' ? 1 : 0)).trim();
        const startD = new Date(ev.start.dateTime);
        const endD   = new Date(ev.end.dateTime);
        // If event ends at midnight (next day), treat as end of day (slot 96)
        const endSlotRaw = endD >= nextDay ? TOTAL_SLOTS : dateToSlot(endD);
        const endSlot = Math.max(dateToSlot(startD), endSlotRaw - 1);
        return { startSlot: dateToSlot(startD), endSlot, name, emoji, eventId: ev.id };
      });
    setSyncState('ok');
    renderEntries();
  } catch (err) {
    console.error(err);
    setSyncState('err');
    showToast('Calendar error: ' + err.message, true);
  }
}

async function createCalEvent(entry, date) {
  const startD = slotToDate(entry.startSlot, date);
  const endD   = slotToDate(entry.endSlot + 1, date);
  const calId  = encodeURIComponent(CALENDAR_ID);
  const data = await gcalRequest('POST', `/calendars/${calId}/events`, {
    summary: `${TB_PREFIX}${entry.emoji} ${entry.name}`,
    start: { dateTime: startD.toISOString() },
    end:   { dateTime: endD.toISOString() },
    colorId: '8'   // graphite — subtle in Google Calendar
  });
  return data?.id || null;
}

async function deleteCalEvent(eventId) {
  if (!eventId) return;
  const calId = encodeURIComponent(CALENDAR_ID);
  await gcalRequest('DELETE', `/calendars/${calId}/events/${eventId}`);
}

// ─── DATE / SLOT HELPERS ──────────────────────────────────────────────────────
function getViewDate() {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() + viewDay);
  return d;
}

function dateToSlot(d) {
  return d.getHours() * 4 + Math.floor(d.getMinutes() / 15);
}

function slotToDate(slot, base) {
  const d = new Date(base);
  d.setHours(Math.floor(slot / 4), (slot % 4) * 15, 0, 0);
  return d;
}

function slotToTime(slot) {
  const h = Math.floor(slot / 4), m = (slot % 4) * 15;
  const ampm = h < 12 ? 'am' : 'pm';
  const hh = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${hh}:${String(m).padStart(2,'0')}${ampm}`;
}

function fmtDayLabel(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff  = Math.round((d - today) / 86400000);
  if (diff === 0)  return 'TODAY';
  if (diff === -1) return 'YESTERDAY';
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
}

// ─── SYNC DOT ─────────────────────────────────────────────────────────────────
function setSyncState(s) {
  document.getElementById('syncDot').className = 'sync-dot' + (s ? ' ' + s : '');
}

// ─── BUILD SCHEDULE ───────────────────────────────────────────────────────────
function buildSchedule() {
  const timeCol  = document.getElementById('timeCol');
  const slotsCol = document.getElementById('slotsCol');
  timeCol.innerHTML = '';
  slotsCol.innerHTML = '';

  for (let h = 0; h < 24; h++) {
    const lbl = document.createElement('div');
    lbl.className = 'hour-label';
    lbl.textContent = h === 0 ? '12am' : h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h-12}pm`;
    timeCol.appendChild(lbl);
  }

  for (let s = 0; s < TOTAL_SLOTS; s++) {
    const div = document.createElement('div');
    const mod = s % 4;
    div.className = 'slot' + (mod === 0 ? ' hour-top' : mod === 2 ? ' half-hour' : ' quarter');
    div.dataset.slot = s;
    slotsCol.appendChild(div);
  }

  attachListeners();
  renderNowLine();
  updateHeader();
  entries = [];
  fetchDayEvents(getViewDate());
}

function updateHeader() {
  document.getElementById('dayLabel').textContent = fmtDayLabel(getViewDate());
  const btn = document.getElementById('nextDay');
  btn.style.opacity = viewDay >= 0 ? '0.3' : '1';
  btn.disabled = viewDay >= 0;
}

// ─── RENDER ENTRIES ───────────────────────────────────────────────────────────
function renderEntries() {
  document.querySelectorAll('.entry-block').forEach(e => e.remove());
  const slotsCol = document.getElementById('slotsCol');

  entries.forEach(entry => {
    const cat = catByName(entry.name);
    const el  = document.createElement('div');
    el.className = 'entry-block';
    el.style.top        = (entry.startSlot * SLOT_H + 1) + 'px';
    const h = (entry.endSlot - entry.startSlot + 1) * SLOT_H - 2;
    el.style.height     = Math.max(16, h) + 'px';
    el.style.background = cat.color;
    el.innerHTML = `
      <span class="eb-emoji">${entry.emoji}</span>
      <span class="eb-name">${entry.name}</span>
      ${h > 22 ? `<span class="eb-time">${slotToTime(entry.startSlot)}</span>` : ''}
      <button class="eb-del">×</button>
    `;
    el.querySelector('.eb-del').addEventListener('click', async e => {
      e.stopPropagation();
      const evId = entry.eventId;
      entries = entries.filter(x => x !== entry);
      renderEntries();
      try {
        setSyncState('syncing');
        await deleteCalEvent(evId);
        setSyncState('ok');
      } catch(err) {
        setSyncState('err');
        showToast('Delete failed: ' + err.message, true);
      }
    });
    slotsCol.appendChild(el);
  });
  if (summaryVisible) renderSummary();
}

// ─── NOW LINE ─────────────────────────────────────────────────────────────────
function renderNowLine() {
  document.querySelectorAll('.now-line').forEach(e => e.remove());
  if (viewDay !== 0) return;
  const now  = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  const line = document.createElement('div');
  line.className = 'now-line';
  line.style.top = ((mins / 15) * SLOT_H) + 'px';
  line.innerHTML = '<div class="now-dot"></div>';
  document.getElementById('slotsCol').appendChild(line);
}

// ─── SLOT MATH ────────────────────────────────────────────────────────────────
function getSlotFromClientY(clientY) {
  const wrap = document.getElementById('schedWrap');
  return Math.max(0, Math.min(TOTAL_SLOTS - 1,
    Math.floor((clientY - wrap.getBoundingClientRect().top + wrap.scrollTop) / SLOT_H)
  ));
}

function highlightRange(a, b) {
  const lo = Math.min(a,b), hi = Math.max(a,b);
  document.querySelectorAll('.slot').forEach(s => {
    s.classList.toggle('selecting', parseInt(s.dataset.slot) >= lo && parseInt(s.dataset.slot) <= hi);
  });
}

function clearHighlight() {
  document.querySelectorAll('.slot.selecting').forEach(s => s.classList.remove('selecting'));
}

// ─── LISTENERS ────────────────────────────────────────────────────────────────
function attachListeners() {
  const slotsCol  = document.getElementById('slotsCol');
  const schedWrap = document.getElementById('schedWrap');
  const LONG_PRESS_MS = 320;
  const EDGE_ZONE     = 60;
  const SCROLL_SPEED  = 6;
  let longPressTimer = null, autoScrollRAF = null, lastClientY = 0;

  function startSel(clientY) {
    selStart = selEnd = getSlotFromClientY(clientY);
    isDragging = true;
    highlightRange(selStart, selEnd);
    if (navigator.vibrate) navigator.vibrate(30);
  }

  function cancelLP() { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } }

  function stopAS() { if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; } }

  function runAS() {
    stopAS();
    function step() {
      if (!isDragging) { stopAS(); return; }
      const r = schedWrap.getBoundingClientRect();
      const dt = lastClientY - r.top, db = r.bottom - lastClientY;
      if (dt < EDGE_ZONE && dt > 0)      schedWrap.scrollTop -= SCROLL_SPEED * (1 - dt / EDGE_ZONE);
      else if (db < EDGE_ZONE && db > 0) schedWrap.scrollTop += SCROLL_SPEED * (1 - db / EDGE_ZONE);
      else { stopAS(); return; }
      selEnd = getSlotFromClientY(lastClientY);
      highlightRange(selStart, selEnd);
      autoScrollRAF = requestAnimationFrame(step);
    }
    autoScrollRAF = requestAnimationFrame(step);
  }

  // Touch
  slotsCol.addEventListener('touchstart', e => {
    lastClientY = e.touches[0].clientY;
    longPressTimer = setTimeout(() => { longPressTimer = null; startSel(lastClientY); }, LONG_PRESS_MS);
  }, { passive: true });

  slotsCol.addEventListener('touchmove', e => {
    lastClientY = e.touches[0].clientY;
    if (!isDragging) { cancelLP(); return; }
    e.preventDefault();
    selEnd = getSlotFromClientY(lastClientY);
    highlightRange(selStart, selEnd);
    runAS();
  }, { passive: false });

  slotsCol.addEventListener('touchend', () => {
    cancelLP(); stopAS();
    if (!isDragging) return;
    isDragging = false; clearHighlight();
    if (selStart !== null) openPicker(Math.min(selStart, selEnd), Math.max(selStart, selEnd));
  });

  slotsCol.addEventListener('touchcancel', () => { cancelLP(); stopAS(); isDragging = false; clearHighlight(); });

  // Mouse
  slotsCol.addEventListener('mousedown', e => {
    lastClientY = e.clientY;
    longPressTimer = setTimeout(() => { longPressTimer = null; startSel(lastClientY); }, LONG_PRESS_MS);
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    lastClientY = e.clientY;
    if (!isDragging) return;
    selEnd = getSlotFromClientY(e.clientY);
    highlightRange(selStart, selEnd);
    runAS();
  });

  window.addEventListener('mouseup', () => {
    cancelLP(); stopAS();
    if (!isDragging) return;
    isDragging = false; clearHighlight();
    if (selStart !== null) openPicker(Math.min(selStart, selEnd), Math.max(selStart, selEnd));
  });
}

// ─── PICKER ───────────────────────────────────────────────────────────────────
function openPicker(startSlot, endSlot) {
  const endTime = endSlot + 1 >= TOTAL_SLOTS ? '12:00am' : slotToTime(endSlot + 1);
  document.getElementById('pickerRange').textContent = startSlot === endSlot
    ? `${slotToTime(startSlot)} (15 min)`
    : `${slotToTime(startSlot)} – ${endTime}`;
  document.getElementById('customInput').value = '';

  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill';
    pill.innerHTML = `<span class="cp-emoji">${cat.emoji}</span><span class="cp-name">${cat.name}</span>`;
    pill.onclick = () => { logEntry(cat.emoji, cat.name, startSlot, endSlot); closePicker(); };
    grid.appendChild(pill);
  });

  document.getElementById('logCustomBtn').onclick = () => {
    const v = document.getElementById('customInput').value.trim();
    if (v) { logEntry('📌', v, startSlot, endSlot); closePicker(); }
  };
  document.getElementById('customInput').onkeydown = e => {
    if (e.key === 'Enter') document.getElementById('logCustomBtn').click();
  };
  document.getElementById('pickerOverlay').classList.add('open');
}

function closePicker() { document.getElementById('pickerOverlay').classList.remove('open'); }

document.getElementById('pickerClose').onclick = closePicker;
document.getElementById('pickerOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('pickerOverlay')) closePicker();
});

// ─── LOG ENTRY ────────────────────────────────────────────────────────────────
async function logEntry(emoji, name, startSlot, endSlot) {
  const date = getViewDate();

  // Remove overlapping entries
  const toDelete = entries.filter(e => e.endSlot >= startSlot && e.startSlot <= endSlot);
  entries = entries.filter(e => e.endSlot < startSlot || e.startSlot > endSlot);
  renderEntries();

  // Optimistic add
  const newEntry = { startSlot, endSlot, name, emoji, eventId: null };
  entries.push(newEntry);
  renderEntries();

  const mins = (endSlot - startSlot + 1) * 15;
  showToast(`${emoji} ${name} · ${mins >= 60 ? (mins/60).toFixed(2)+'h' : mins+'min'}`);

  try {
    setSyncState('syncing');
    // Delete overlapping calendar events
    await Promise.all(toDelete.map(e => deleteCalEvent(e.eventId)));
    // Create new event
    newEntry.eventId = await createCalEvent(newEntry, date);
    setSyncState('ok');
  } catch(err) {
    setSyncState('err');
    showToast('Sync failed: ' + err.message, true);
  }
}

// ─── SUMMARY ──────────────────────────────────────────────────────────────────
let summaryVisible = false;
let showUntracked = true;

function brightenColor(hex) {
  const r = Math.min(255, parseInt(hex.slice(1,3), 16) * 3);
  const g = Math.min(255, parseInt(hex.slice(3,5), 16) * 3);
  const b = Math.min(255, parseInt(hex.slice(5,7), 16) * 3);
  return `rgb(${r},${g},${b})`;
}

function renderSummary() {
  const DAY_SLOTS = 96; // 24h × 4 slots/h
  const totals = {};
  entries.forEach(e => {
    const slots = e.endSlot - e.startSlot + 1;
    totals[e.name] = (totals[e.name] || 0) + slots;
  });
  const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const loggedSlots = sorted.reduce((s, [, v]) => s + v, 0);
  const untrackedSlots = DAY_SLOTS - loggedSlots;

  const legend = document.getElementById('summaryLegend');
  const canvas = document.getElementById('summaryCanvas');
  const ctx = canvas.getContext('2d');

  if (loggedSlots === 0) {
    canvas.style.display = 'none';
    legend.innerHTML = '<div class="summary-empty">No entries for this day.</div>';
    return;
  }

  // Build chart slices: tracked categories + optional untracked remainder
  const chartData = [...sorted];
  if (showUntracked && untrackedSlots > 0) chartData.push(['Untracked', untrackedSlots]);
  // Denominator for percentages: full day if showing untracked, else just logged
  const denomSlots = showUntracked ? DAY_SLOTS : loggedSlots;

  canvas.style.display = '';
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(300, window.innerWidth - 32);
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, size, size);

  const cx = size / 2, cy = size / 2;
  const outerR = size / 2 - 8;
  const innerR = outerR * 0.50;
  const labelR  = (innerR + outerR) / 2;

  // Pass 1: draw slices
  let angle = -Math.PI / 2;
  const slices = chartData.map(([name, slots]) => {
    const sweep = (slots / denomSlots) * Math.PI * 2;
    const color = name === 'Untracked' ? '#323438' : brightenColor(catByName(name).color);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
    ctx.arc(cx, cy, outerR, angle, angle + sweep);
    ctx.arc(cx, cy, innerR, angle + sweep, angle, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#111214';
    ctx.lineWidth = 2;
    ctx.stroke();
    const mid = angle + sweep / 2;
    angle += sweep;
    return { name, slots, mid, color };
  });

  // Pass 2: draw slice labels (skip very small slices < 8%)
  slices.forEach(({ name, slots, mid }) => {
    const pct = slots / denomSlots;
    if (pct < 0.08) return;
    const lx = cx + Math.cos(mid) * labelR;
    const ly = cy + Math.sin(mid) * labelR;
    const mins = slots * 15;
    const timeStr = mins >= 60 ? (mins / 60).toFixed(2) + 'h' : mins + 'min';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = `bold 10px 'IBM Plex Mono', monospace`;
    ctx.fillText(Math.round(pct * 100) + '%', lx, ly - 5.5);
    ctx.font = `9px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = 'rgba(255,255,255,0.60)';
    ctx.fillText(timeStr, lx, ly + 6);
  });

  // Center text
  const loggedHours = (loggedSlots * 15 / 60).toFixed(2);
  ctx.fillStyle = '#e8e6e1';
  ctx.font = `bold 20px 'IBM Plex Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(loggedHours + 'h', cx, cy - 8);
  ctx.font = `9px 'IBM Plex Mono', monospace`;
  ctx.fillStyle = '#555860';
  ctx.fillText('logged', cx, cy + 9);

  // Legend
  legend.innerHTML = '';
  chartData.forEach(([name, slots]) => {
    const isUntracked = name === 'Untracked';
    const cat = isUntracked ? null : catByName(name);
    const swatchColor = isUntracked ? '#323438' : brightenColor(cat.color);
    const mins = slots * 15;
    const pct = Math.round(slots / denomSlots * 100);
    const timeStr = mins >= 60 ? (mins / 60).toFixed(2) + 'h' : mins + 'min';
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `
      <div class="legend-swatch" style="background:${swatchColor};border:1px solid rgba(255,255,255,0.1)"></div>
      <span class="legend-name" style="${isUntracked ? 'color:var(--muted)' : ''}">${isUntracked ? '· Untracked' : `${cat.emoji} ${name}`}</span>
      <span class="legend-time" style="${isUntracked ? 'color:var(--muted)' : ''}">${timeStr}</span>
      <span class="legend-pct">${pct}%</span>
    `;
    legend.appendChild(row);
  });
}

document.getElementById('summaryBtn').onclick = () => {
  summaryVisible = !summaryVisible;
  document.getElementById('schedWrap').style.display = summaryVisible ? 'none' : '';
  document.getElementById('summaryPanel').classList.toggle('visible', summaryVisible);
  document.getElementById('summaryBtn').classList.toggle('active', summaryVisible);
  if (summaryVisible) renderSummary();
};

document.getElementById('showUntrackedChk').onchange = e => {
  showUntracked = e.target.checked;
  renderSummary();
};

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function hideSummary() {
  summaryVisible = false;
  document.getElementById('schedWrap').style.display = '';
  document.getElementById('summaryPanel').classList.remove('visible');
  document.getElementById('summaryBtn').classList.remove('active');
}

document.getElementById('prevDay').onclick  = () => { hideSummary(); viewDay--; buildSchedule(); };
document.getElementById('nextDay').onclick  = () => { if (viewDay < 0) { hideSummary(); viewDay++; buildSchedule(); } };
document.getElementById('todayBtn').onclick = () => { hideSummary(); viewDay = 0; buildSchedule(); scrollToNow(); };

function scrollToNow() {
  if (viewDay !== 0) return;
  const now  = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  document.getElementById('schedWrap').scrollTop = Math.max(0, (mins / 15) * SLOT_H - 160);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Wait for GSI library to load before initializing auth
window.addEventListener('load', () => {
  // Poll briefly for GSI to be ready
  let attempts = 0;
  const check = setInterval(() => {
    attempts++;
    if (typeof google !== 'undefined' && google.accounts) {
      clearInterval(check);
      initAuth();
    } else if (attempts > 20) {
      clearInterval(check);
      showToast('Failed to load Google Sign-In', true);
    }
  }, 200);
});

setInterval(renderNowLine, 60000);
</script>
