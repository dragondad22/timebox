<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>TimeBox</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111214;
  --surface: #1c1e21;
  --border: #2c2e33;
  --text: #e8e6e1;
  --muted: #555860;
  --accent: #e8f558;
  --accent2: #58d8f5;
  --slot-h: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 2px;
  color: var(--accent);
  flex-shrink: 0;
}

.day-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.nav-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 5px 11px;
  font-size: 15px;
  cursor: pointer;
  line-height: 1;
}

.day-label {
  font-size: 11px;
  color: var(--text);
  min-width: 96px;
  text-align: center;
  letter-spacing: 0.06em;
}

.today-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 5px 9px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

/* sync status indicator */
.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background 0.3s;
}
.sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
.sync-dot.ok      { background: #4caf50; }
.sync-dot.err     { background: #e55; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.schedule-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  position: relative;
}

.schedule {
  display: flex;
  position: relative;
}

.time-col {
  width: 52px;
  flex-shrink: 0;
  position: sticky;
  left: 0;
  background: var(--bg);
  z-index: 2;
}

.hour-label {
  height: calc(var(--slot-h) * 4);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 3px 8px 0 0;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.slots-col {
  flex: 1;
  position: relative;
  border-left: 1px solid var(--border);
}

.slot {
  height: var(--slot-h);
  border-bottom: 1px solid #1a1c20;
  cursor: pointer;
}

.slot.hour-top  { border-top: 1px solid var(--border); border-bottom: 1px solid #1a1c20; }
.slot.quarter   { border-bottom: 1px solid #1a1c20; }
.slot.half-hour { border-bottom: 1px solid #252830; }
.slot.selecting { background: rgba(232,245,88,0.2) !important; }

.entry-block {
  position: absolute;
  left: 3px; right: 3px;
  border-radius: 5px;
  padding: 2px 7px;
  display: flex;
  align-items: center;
  gap: 5px;
  overflow: hidden;
  z-index: 1;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: default;
}

.eb-emoji { font-size: 13px; flex-shrink: 0; line-height: 1; }
.eb-name  { font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.eb-time  { font-size: 9px; color: rgba(255,255,255,0.4); flex-shrink: 0; }
.eb-del {
  margin-left: 2px; flex-shrink: 0;
  background: rgba(0,0,0,0.35); border: none;
  color: rgba(255,255,255,0.5); border-radius: 3px;
  width: 15px; height: 15px; font-size: 11px;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; padding: 0; line-height: 1;
}

.now-line {
  position: absolute; left: 0; right: 0;
  height: 2px; background: var(--accent2);
  z-index: 3; pointer-events: none;
}
.now-dot {
  position: absolute; left: -4px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent2);
}

/* PICKER */
.picker-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 10; display: none;
  align-items: flex-end;
  backdrop-filter: blur(3px);
}
.picker-overlay.open { display: flex; }

.picker-sheet {
  background: #16181c;
  border-top: 1px solid var(--border);
  border-radius: 18px 18px 0 0;
  width: 100%;
  padding: 14px 14px 28px;
  transform: translateY(100%);
  transition: transform 0.26s cubic-bezier(0.32, 0.72, 0, 1);
}
.picker-overlay.open .picker-sheet { transform: translateY(0); }

.picker-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 14px;
}
.picker-range { font-size: 13px; color: var(--accent); letter-spacing: 0.04em; }
.picker-close {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px; padding: 5px 11px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer;
}

.cat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; margin-bottom: 12px;
}

.cat-pill {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 11px 4px 9px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
}
.cat-pill:active { transform: scale(0.93); border-color: var(--accent); }
.cp-emoji { font-size: 21px; }
.cp-name  { font-size: 9px; color: var(--muted); text-align: center; line-height: 1.2; }

.custom-row { display: flex; gap: 8px; }

.custom-input {
  flex: 1; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 12px; color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none;
}
.custom-input:focus { border-color: var(--accent); }
.custom-input::placeholder { color: var(--muted); }

.log-btn {
  background: var(--accent); color: #000; border: none;
  border-radius: 8px; padding: 10px 16px;
  font-family: 'Bebas Neue', sans-serif; font-size: 17px;
  letter-spacing: 1px; cursor: pointer;
}

/* TOAST */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(30px);
  background: var(--accent); color: #000;
  padding: 8px 18px; border-radius: 40px;
  font-size: 12px; font-weight: 500;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
  z-index: 100; pointer-events: none; opacity: 0;
  white-space: nowrap; max-width: 92vw; overflow: hidden; text-overflow: ellipsis;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.err { background: #e55; color: #fff; }
</style>
</head>
<body>

<header>
  <div class="logo">TIMEBOX</div>
  <div class="day-nav">
    <button class="nav-btn" id="prevDay">◀</button>
    <div class="day-label" id="dayLabel">—</div>
    <button class="nav-btn" id="nextDay">▶</button>
  </div>
  <button class="today-btn" id="todayBtn">TODAY</button>
  <div class="sync-dot" id="syncDot" title="Sync status"></div>
</header>

<div class="schedule-wrap" id="schedWrap">
  <div class="schedule" id="schedule">
    <div class="time-col" id="timeCol"></div>
    <div class="slots-col" id="slotsCol"></div>
  </div>
</div>

<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-sheet">
    <div class="picker-header">
      <div class="picker-range" id="pickerRange">—</div>
      <button class="picker-close" id="pickerClose">Cancel</button>
    </div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="custom-row">
      <input class="custom-input" id="customInput" placeholder="other activity…" maxlength="30">
      <button class="log-btn" id="logCustomBtn">LOG</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const TOTAL_SLOTS = 96;
const SLOT_H = 18;
const TB_PREFIX = '[TB] ';       // prefix on all calendar events
const CAL_ID = 'primary';        // use primary calendar; change if desired

const CATEGORIES = [
  { emoji: '💼', name: 'Zoolytix',     color: '#1e4a30' },
  { emoji: '🔪', name: 'Alpaca Werks', color: '#4a1e1e' },
  { emoji: '🤝', name: 'Meetings',     color: '#1e2e4a' },
  { emoji: '🧠', name: 'Deep Work',    color: '#2e1e4a' },
  { emoji: '📧', name: 'Email/Admin',  color: '#3a3010' },
  { emoji: '🌱', name: 'Garden',       color: '#1a3a18' },
  { emoji: '🎨', name: 'Creating',     color: '#3a1a30' },
  { emoji: '📚', name: 'Learning',     color: '#102838' },
  { emoji: '☕', name: 'Break',        color: '#2e2416' },
  { emoji: '🏃', name: 'Exercise',     color: '#103828' },
  { emoji: '😴', name: 'Sleep',        color: '#141422' },
  { emoji: '🍽️', name: 'Meal',         color: '#382210' },
  { emoji: '📺', name: 'Entertainment',color: '#3a1a1a' },
];

function catByName(name) {
  return CATEGORIES.find(c => c.name === name) || { emoji: '📌', name, color: '#252830' };
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let viewDay = 0;
let entries = [];        // { startSlot, endSlot, name, emoji, eventId }
let selStart = null, selEnd = null, isDragging = false;

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function getViewDate() {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() + viewDay);
  return d;
}

function dayKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function slotToDate(slot, baseDate) {
  const d = new Date(baseDate);
  d.setHours(Math.floor(slot / 4), (slot % 4) * 15, 0, 0);
  return d;
}

function dateToSlot(d) {
  return d.getHours() * 4 + Math.floor(d.getMinutes() / 15);
}

function slotToTime(slot) {
  const h = Math.floor(slot / 4), m = (slot % 4) * 15;
  const ampm = h < 12 ? 'am' : 'pm';
  const hh = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${hh}:${String(m).padStart(2,'0')}${ampm}`;
}

function fmtDayLabel(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'TODAY';
  if (diff === -1) return 'YESTERDAY';
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
}

function isoDate(d) { return d.toISOString(); }

// ─── SYNC DOT ─────────────────────────────────────────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
}

// ─── GOOGLE CALENDAR API ──────────────────────────────────────────────────────
async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: 'You are a Google Calendar assistant. Use the gcal MCP tool to perform the requested operation. Respond only with a JSON object: {"success": true/false, "events": [...], "eventId": "...", "error": "..."}. No prose.',
      messages: [{ role: 'user', content: prompt }],
      mcp_servers: [{ type: 'url', url: 'https://gcal.mcp.claude.com/mcp', name: 'gcal' }]
    })
  });
  const data = await res.json();
  // Extract text and tool results from response
  const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  const toolResults = (data.content || []).filter(b => b.type === 'mcp_tool_result');
  return { textBlocks, toolResults, raw: data };
}

async function fetchDayEvents(date) {
  setSyncState('syncing');
  try {
    const start = new Date(date); start.setHours(0,0,0,0);
    const end   = new Date(date); end.setHours(23,59,59,999);
    const prompt = `List all Google Calendar events on the primary calendar between ${isoDate(start)} and ${isoDate(end)}. Return as JSON with "events" array, each event having: id, summary, start.dateTime, end.dateTime.`;
    const { textBlocks, toolResults } = await callClaude(prompt);

    // Try to parse events from tool results first, then text
    let events = [];
    for (const tr of toolResults) {
      try {
        const d = JSON.parse(tr.content?.[0]?.text || '{}');
        if (d.items) { events = d.items; break; }
        if (d.events) { events = d.events; break; }
      } catch {}
    }
    if (!events.length) {
      try {
        const clean = textBlocks.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);
        events = parsed.events || parsed.items || [];
      } catch {}
    }

    // Convert to entries
    entries = events
      .filter(ev => ev.summary && ev.summary.startsWith(TB_PREFIX))
      .map(ev => {
        const name = ev.summary.slice(TB_PREFIX.length).replace(/^[^\s]+\s/, ''); // strip emoji
        const emoji = ev.summary.slice(TB_PREFIX.length).split(' ')[0];
        const startD = new Date(ev.start.dateTime || ev.start.date);
        const endD   = new Date(ev.end.dateTime   || ev.end.date);
        // endSlot: subtract 1 slot because gcal end is exclusive
        const endSlot = Math.max(dateToSlot(startD), dateToSlot(endD) - 1);
        return {
          startSlot: dateToSlot(startD),
          endSlot,
          name, emoji,
          eventId: ev.id
        };
      });

    setSyncState('ok');
    renderEntries();
  } catch (err) {
    console.error(err);
    setSyncState('err');
    showToast('Could not load calendar', true);
  }
}

async function createEvent(entry, date) {
  setSyncState('syncing');
  try {
    const startD = slotToDate(entry.startSlot, date);
    const endD   = slotToDate(entry.endSlot + 1, date); // gcal end is exclusive
    const title  = `${TB_PREFIX}${entry.emoji} ${entry.name}`;
    const prompt = `Create a Google Calendar event on the primary calendar:
- Title: "${title}"
- Start: ${isoDate(startD)}
- End: ${isoDate(endD)}
Return JSON with "eventId" being the created event's id.`;
    const { textBlocks, toolResults } = await callClaude(prompt);

    // Try to get the event id
    let eventId = null;
    for (const tr of toolResults) {
      try {
        const d = JSON.parse(tr.content?.[0]?.text || '{}');
        if (d.id) { eventId = d.id; break; }
      } catch {}
    }
    if (!eventId) {
      try {
        const clean = textBlocks.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);
        eventId = parsed.eventId || parsed.id;
      } catch {}
    }

    setSyncState('ok');
    return eventId;
  } catch (err) {
    console.error(err);
    setSyncState('err');
    showToast('Could not save to calendar', true);
    return null;
  }
}

async function deleteEvent(eventId) {
  if (!eventId) return;
  setSyncState('syncing');
  try {
    await callClaude(`Delete the Google Calendar event with id "${eventId}" from the primary calendar.`);
    setSyncState('ok');
  } catch (err) {
    console.error(err);
    setSyncState('err');
    showToast('Could not delete from calendar', true);
  }
}

// ─── BUILD SCHEDULE DOM ───────────────────────────────────────────────────────
function buildSchedule() {
  const timeCol  = document.getElementById('timeCol');
  const slotsCol = document.getElementById('slotsCol');
  timeCol.innerHTML = '';
  slotsCol.innerHTML = '';

  for (let h = 0; h < 24; h++) {
    const lbl = document.createElement('div');
    lbl.className = 'hour-label';
    lbl.textContent = h === 0 ? '12am' : h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h-12}pm`;
    timeCol.appendChild(lbl);
  }

  for (let s = 0; s < TOTAL_SLOTS; s++) {
    const div = document.createElement('div');
    const mod = s % 4;
    let cls = 'slot';
    if (mod === 0) cls += ' hour-top';
    else if (mod === 2) cls += ' half-hour';
    else cls += ' quarter';
    div.className = cls;
    div.dataset.slot = s;
    slotsCol.appendChild(div);
  }

  attachListeners();
  renderNowLine();
  updateHeader();
  entries = [];
  fetchDayEvents(getViewDate());
}

function updateHeader() {
  document.getElementById('dayLabel').textContent = fmtDayLabel(getViewDate());
  const nextBtn = document.getElementById('nextDay');
  nextBtn.style.opacity = viewDay >= 0 ? '0.3' : '1';
  nextBtn.disabled = viewDay >= 0;
}

// ─── RENDER ENTRIES ───────────────────────────────────────────────────────────
function renderEntries() {
  document.querySelectorAll('.entry-block').forEach(e => e.remove());
  const slotsCol = document.getElementById('slotsCol');

  entries.forEach(entry => {
    const cat = catByName(entry.name);
    const el = document.createElement('div');
    el.className = 'entry-block';
    el.style.top    = (entry.startSlot * SLOT_H + 1) + 'px';
    const h = (entry.endSlot - entry.startSlot + 1) * SLOT_H - 2;
    el.style.height = Math.max(16, h) + 'px';
    el.style.background = cat.color;

    const showTime = h > 22;
    el.innerHTML = `
      <span class="eb-emoji">${entry.emoji}</span>
      <span class="eb-name">${entry.name}</span>
      ${showTime ? `<span class="eb-time">${slotToTime(entry.startSlot)}</span>` : ''}
      <button class="eb-del">×</button>
    `;
    el.querySelector('.eb-del').addEventListener('click', async e => {
      e.stopPropagation();
      const evId = entry.eventId;
      entries = entries.filter(x => x !== entry);
      renderEntries();
      await deleteEvent(evId);
    });
    slotsCol.appendChild(el);
  });
}

// ─── NOW LINE ─────────────────────────────────────────────────────────────────
function renderNowLine() {
  document.querySelectorAll('.now-line').forEach(e => e.remove());
  if (viewDay !== 0) return;
  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  const top = (mins / 15) * SLOT_H;
  const line = document.createElement('div');
  line.className = 'now-line';
  line.style.top = top + 'px';
  line.innerHTML = '<div class="now-dot"></div>';
  document.getElementById('slotsCol').appendChild(line);
}

// ─── SLOT MATH ────────────────────────────────────────────────────────────────
function getSlotFromClientY(clientY) {
  const schedWrap = document.getElementById('schedWrap');
  const wrapTop = schedWrap.getBoundingClientRect().top;
  const absoluteY = clientY - wrapTop + schedWrap.scrollTop;
  return Math.max(0, Math.min(TOTAL_SLOTS - 1, Math.floor(absoluteY / SLOT_H)));
}

function highlightRange(a, b) {
  const lo = Math.min(a, b), hi = Math.max(a, b);
  document.querySelectorAll('.slot').forEach(s => {
    const i = parseInt(s.dataset.slot);
    s.classList.toggle('selecting', i >= lo && i <= hi);
  });
}

function clearHighlight() {
  document.querySelectorAll('.slot.selecting').forEach(s => s.classList.remove('selecting'));
}

// ─── LISTENERS ────────────────────────────────────────────────────────────────
function attachListeners() {
  const slotsCol  = document.getElementById('slotsCol');
  const schedWrap = document.getElementById('schedWrap');
  const LONG_PRESS_MS = 320;
  const EDGE_ZONE  = 60;
  const SCROLL_SPEED = 6;

  let longPressTimer = null;
  let autoScrollRAF  = null;
  let lastClientY    = 0;

  function startSelection(clientY) {
    selStart = selEnd = getSlotFromClientY(clientY);
    isDragging = true;
    highlightRange(selStart, selEnd);
    if (navigator.vibrate) navigator.vibrate(30);
  }

  function cancelLongPress() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  }

  function stopAutoScroll() {
    if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; }
  }

  function runAutoScroll(clientY) {
    stopAutoScroll();
    function step() {
      if (!isDragging) { stopAutoScroll(); return; }
      const wrapRect = schedWrap.getBoundingClientRect();
      const distFromTop = lastClientY - wrapRect.top;
      const distFromBot = wrapRect.bottom - lastClientY;
      if (distFromTop < EDGE_ZONE && distFromTop > 0) {
        schedWrap.scrollTop -= SCROLL_SPEED * (1 - distFromTop / EDGE_ZONE);
      } else if (distFromBot < EDGE_ZONE && distFromBot > 0) {
        schedWrap.scrollTop += SCROLL_SPEED * (1 - distFromBot / EDGE_ZONE);
      } else {
        stopAutoScroll(); return;
      }
      selEnd = getSlotFromClientY(lastClientY);
      highlightRange(selStart, selEnd);
      autoScrollRAF = requestAnimationFrame(step);
    }
    autoScrollRAF = requestAnimationFrame(step);
  }

  // Touch
  slotsCol.addEventListener('touchstart', e => {
    lastClientY = e.touches[0].clientY;
    longPressTimer = setTimeout(() => {
      longPressTimer = null;
      startSelection(lastClientY);
    }, LONG_PRESS_MS);
  }, { passive: true });

  slotsCol.addEventListener('touchmove', e => {
    lastClientY = e.touches[0].clientY;
    if (!isDragging) { cancelLongPress(); return; }
    e.preventDefault();
    selEnd = getSlotFromClientY(lastClientY);
    highlightRange(selStart, selEnd);
    runAutoScroll(lastClientY);
  }, { passive: false });

  slotsCol.addEventListener('touchend', () => {
    cancelLongPress(); stopAutoScroll();
    if (!isDragging) return;
    isDragging = false; clearHighlight();
    if (selStart !== null) openPicker(Math.min(selStart, selEnd), Math.max(selStart, selEnd));
  });

  slotsCol.addEventListener('touchcancel', () => {
    cancelLongPress(); stopAutoScroll();
    isDragging = false; clearHighlight();
  });

  // Mouse
  slotsCol.addEventListener('mousedown', e => {
    lastClientY = e.clientY;
    longPressTimer = setTimeout(() => {
      longPressTimer = null;
      startSelection(lastClientY);
    }, LONG_PRESS_MS);
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    lastClientY = e.clientY;
    if (!isDragging) return;
    selEnd = getSlotFromClientY(e.clientY);
    highlightRange(selStart, selEnd);
    runAutoScroll(e.clientY);
  });

  window.addEventListener('mouseup', () => {
    cancelLongPress(); stopAutoScroll();
    if (!isDragging) return;
    isDragging = false; clearHighlight();
    if (selStart !== null) openPicker(Math.min(selStart, selEnd), Math.max(selStart, selEnd));
  });
}

// ─── PICKER ───────────────────────────────────────────────────────────────────
function openPicker(startSlot, endSlot) {
  const endTime = slotToTime(Math.min(endSlot + 1, TOTAL_SLOTS - 1));
  document.getElementById('pickerRange').textContent = startSlot === endSlot
    ? slotToTime(startSlot) + ' (15 min)'
    : `${slotToTime(startSlot)} – ${endTime}`;
  document.getElementById('customInput').value = '';

  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill';
    pill.innerHTML = `<span class="cp-emoji">${cat.emoji}</span><span class="cp-name">${cat.name}</span>`;
    pill.onclick = () => { logEntry(cat.emoji, cat.name, startSlot, endSlot); closePicker(); };
    grid.appendChild(pill);
  });

  document.getElementById('logCustomBtn').onclick = () => {
    const v = document.getElementById('customInput').value.trim();
    if (v) { logEntry('📌', v, startSlot, endSlot); closePicker(); }
  };
  document.getElementById('customInput').onkeydown = e => {
    if (e.key === 'Enter') document.getElementById('logCustomBtn').click();
  };
  document.getElementById('pickerOverlay').classList.add('open');
}

function closePicker() {
  document.getElementById('pickerOverlay').classList.remove('open');
}

document.getElementById('pickerClose').onclick = closePicker;
document.getElementById('pickerOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('pickerOverlay')) closePicker();
});

// ─── LOG ──────────────────────────────────────────────────────────────────────
async function logEntry(emoji, name, startSlot, endSlot) {
  const date = getViewDate();

  // Remove any overlapping entries (locally and from calendar)
  const toDelete = entries.filter(e => e.endSlot >= startSlot && e.startSlot <= endSlot);
  entries = entries.filter(e => e.endSlot < startSlot || e.startSlot > endSlot);
  renderEntries();
  for (const e of toDelete) await deleteEvent(e.eventId);

  // Optimistically add to UI
  const newEntry = { startSlot, endSlot, name, emoji, eventId: null };
  entries.push(newEntry);
  renderEntries();

  const mins = (endSlot - startSlot + 1) * 15;
  showToast(`${emoji} ${name} · ${mins >= 60 ? (mins/60).toFixed(1)+'h' : mins+'min'}`);

  // Save to Google Calendar
  const eventId = await createEvent(newEntry, date);
  newEntry.eventId = eventId;
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
document.getElementById('prevDay').onclick  = () => { viewDay--; buildSchedule(); };
document.getElementById('nextDay').onclick  = () => { if (viewDay < 0) { viewDay++; buildSchedule(); } };
document.getElementById('todayBtn').onclick = () => { viewDay = 0; buildSchedule(); scrollToNow(); };

function scrollToNow() {
  if (viewDay !== 0) return;
  const now  = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  document.getElementById('schedWrap').scrollTop = Math.max(0, (mins / 15) * SLOT_H - 160);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSchedule();
scrollToNow();
setInterval(renderNowLine, 60000);
</script>
